<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JARVIS v2</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#e2e8f0;font-family:'SF Mono','Fira Code',monospace;height:100vh;display:flex;flex-direction:column}
#header{padding:16px 24px;border-bottom:1px solid #1e1e2e;display:flex;align-items:center;gap:12px}
#header h1{font-size:18px;background:linear-gradient(135deg,#8b5cf6,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
#header .badge{font-size:11px;color:#6b7280;padding:2px 8px;border:1px solid #1e1e2e;border-radius:4px}
#main{flex:1;display:flex;overflow:hidden}
#sidebar{width:280px;border-right:1px solid #1e1e2e;overflow-y:auto;padding:12px}
#sidebar h3{font-size:12px;color:#6b7280;margin:12px 0 6px;text-transform:uppercase;letter-spacing:1px}
.skill-item{padding:6px 10px;font-size:12px;color:#94a3b8;cursor:pointer;border-radius:4px;margin:1px 0}
.skill-item:hover{background:#1e1e2e;color:#e2e8f0}
.skill-cat{display:inline-block;font-size:9px;padding:1px 5px;border-radius:3px;margin-left:4px}
#chat{flex:1;display:flex;flex-direction:column}
#messages{flex:1;overflow-y:auto;padding:20px 24px}
.msg{margin:12px 0;max-width:85%}
.msg.user{margin-left:auto;text-align:right}
.msg.user .bubble{background:#6d28d9;color:white;border-radius:12px 12px 2px 12px;padding:10px 14px;display:inline-block}
.msg.assistant .bubble{background:#1e1e2e;color:#e2e8f0;border-radius:12px 12px 12px 2px;padding:10px 14px;display:inline-block;text-align:left}
.msg .meta{font-size:10px;color:#4b5563;margin-top:4px}
.skill-badge{font-size:11px;color:#8b5cf6;margin-bottom:4px}
#input-bar{padding:16px 24px;border-top:1px solid #1e1e2e;display:flex;gap:10px}
#input-bar input{flex:1;background:#1e1e2e;border:1px solid #2d2d3e;color:#e2e8f0;padding:10px 14px;border-radius:8px;font-family:inherit;font-size:14px;outline:none}
#input-bar input:focus{border-color:#8b5cf6}
#input-bar button{background:#6d28d9;color:white;border:none;padding:10px 20px;border-radius:8px;cursor:pointer;font-family:inherit;font-size:14px}
#input-bar button:hover{background:#7c3aed}
.streaming{opacity:0.7}
#sidebar::-webkit-scrollbar,#messages::-webkit-scrollbar{width:6px}
#sidebar::-webkit-scrollbar-thumb,#messages::-webkit-scrollbar-thumb{background:#2d2d3e;border-radius:3px}
</style>
</head>
<body>
<div id="header">
  <h1>JARVIS v2</h1>
  <span class="badge">1,323 skills</span>
  <span class="badge">7 LLMs</span>
  <span class="badge" id="status">● connecting</span>
</div>
<div id="main">
  <div id="sidebar">
    <h3>Skills</h3>
    <div id="skill-list">Loading...</div>
  </div>
  <div id="chat">
    <div id="messages"></div>
    <div id="input-bar">
      <input type="text" id="query" placeholder="Ask Jarvis anything..." autofocus>
      <button onclick="send()">Send</button>
    </div>
  </div>
</div>
<script>
const msgs = document.getElementById('messages');
const input = document.getElementById('query');
const status = document.getElementById('status');
let ws;
let currentAssistantDiv = null;

function connect() {
  const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${protocol}//${location.host}/ws`);
  ws.onopen = () => { status.textContent = '● online'; status.style.color = '#10b981'; };
  ws.onclose = () => { status.textContent = '● offline'; status.style.color = '#ef4444'; setTimeout(connect, 3000); };
  ws.onmessage = (e) => {
    const data = JSON.parse(e.data);
    if (data.type === 'skill_match') {
      if (currentAssistantDiv) {
        const badge = document.createElement('div');
        badge.className = 'skill-badge';
        badge.textContent = `⚡ ${data.name} [${data.category}] ${Math.round(data.score*100)}%`;
        currentAssistantDiv.insertBefore(badge, currentAssistantDiv.firstChild);
      }
    } else if (data.type === 'token') {
      if (!currentAssistantDiv) {
        currentAssistantDiv = document.createElement('div');
        currentAssistantDiv.className = 'msg assistant';
        currentAssistantDiv.innerHTML = '<div class="bubble streaming"></div>';
        msgs.appendChild(currentAssistantDiv);
      }
      const bubble = currentAssistantDiv.querySelector('.bubble');
      bubble.textContent += data.content;
      msgs.scrollTop = msgs.scrollHeight;
    } else if (data.type === 'done') {
      if (currentAssistantDiv) {
        const bubble = currentAssistantDiv.querySelector('.bubble');
        bubble.classList.remove('streaming');
      }
      currentAssistantDiv = null;
    }
  };
}

function send() {
  const q = input.value.trim();
  if (!q || !ws || ws.readyState !== 1) return;
  const div = document.createElement('div');
  div.className = 'msg user';
  div.innerHTML = `<div class="bubble">${escHtml(q)}</div>`;
  msgs.appendChild(div);
  input.value = '';
  currentAssistantDiv = null;
  ws.send(q);
  msgs.scrollTop = msgs.scrollHeight;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

input.addEventListener('keydown', (e) => { if (e.key === 'Enter') send(); });

// Load skills sidebar
fetch('/api/skills').then(r => r.json()).then(skills => {
  const list = document.getElementById('skill-list');
  const cats = {};
  skills.forEach(s => {
    if (!cats[s.category]) cats[s.category] = [];
    cats[s.category].push(s);
  });
  list.innerHTML = '';
  Object.keys(cats).sort().forEach(cat => {
    const h = document.createElement('h3');
    h.textContent = `${cat} (${cats[cat].length})`;
    list.appendChild(h);
    cats[cat].slice(0, 15).forEach(s => {
      const d = document.createElement('div');
      d.className = 'skill-item';
      d.textContent = s.name;
      d.onclick = () => { input.value = s.name; input.focus(); };
      list.appendChild(d);
    });
    if (cats[cat].length > 15) {
      const more = document.createElement('div');
      more.className = 'skill-item';
      more.style.color = '#4b5563';
      more.textContent = `+${cats[cat].length - 15} more`;
      list.appendChild(more);
    }
  });
}).catch(() => {});

connect();
</script>
</body>
</html>
